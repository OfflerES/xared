server {
    listen 80;
    listen [::]:80;
    server_name xared.com www.xared.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xared.com www.xared.com;

    ssl_certificate     /etc/letsencrypt/live/xared.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xared.com/privkey.pem;

    root /var/www/xared/dist;
    index index.html;

    # SPA: all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
