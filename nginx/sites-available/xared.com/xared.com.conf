# ══════════════════════════════════════════════════════════════════════════════
# Nginx — xared.com + *.xared.com   (canónicas y sitemap)
# Ruta sugerida: /etc/nginx/sites-available/xared.com
# ══════════════════════════════════════════════════════════════════════════════

# ── Redirigir www → raíz ──────────────────────────────────────────────────────
server {
    listen 80;
    listen 443 ssl http2;
    server_name www.xared.com;

    ssl_certificate     /etc/letsencrypt/live/xared.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xared.com/privkey.pem;

    return 301 https://xared.com$request_uri;
}

# ── Dominio raíz xared.com ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name xared.com;

    ssl_certificate     /etc/letsencrypt/live/xared.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xared.com/privkey.pem;

    root  /var/www/xared/dist;
    index index.html;

    # Sitemap: servir el XML generado por el script
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml; charset=utf-8";
    }

    # robots.txt: permitir indexación completa en el dominio raíz
    location = /robots.txt {
        try_files /robots.txt @robots_default;
    }
    location @robots_default {
        return 200 "User-agent: *\nAllow: /\nSitemap: https://xared.com/sitemap.xml\n";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # Assets con cache largo
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: todo lo demás → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Subdominios *.xared.com ───────────────────────────────────────────────────
# Misma app React, pero con X-Robots-Tag: noindex
# para evitar que Google indexe las versiones subdominio (evitar duplicados).
# Las canónicas en el HTML ya apuntan a xared.com, esto es una capa extra.
server {
    listen 443 ssl http2;
    server_name ~^(?<sub>.+)\.xared\.com$;   # captura cualquier subdominio

    ssl_certificate     /etc/letsencrypt/live/xared.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xared.com/privkey.pem;

    root  /var/www/xared/dist;
    index index.html;

    # CLAVE: decirle a Google que NO indexe las URLs de subdominio
    add_header X-Robots-Tag "noindex, follow" always;

    # Sitemap: en subdominios NO servimos sitemap (redirigir al principal)
    location = /sitemap.xml {
        return 301 https://xared.com/sitemap.xml;
    }

    # robots.txt: bloquear indexación desde subdominios
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # Assets
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, follow" always;
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── HTTP → HTTPS (global) ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name xared.com *.xared.com;
    return 301 https://$host$request_uri;
}
